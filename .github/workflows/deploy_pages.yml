name: Deploy Frontend to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy_pages.yml"
  workflow_dispatch:

jobs:
  deploy-pages:
    if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' && secrets.CLOUDFLARE_PAGES_PROJECT_NAME != '' && secrets.BACKEND_PUBLIC_URL != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject backend URL in frontend config
        run: |
          cat > frontend/config.js <<'EOF'
          window.__API_BASE_URL__ = "${{ secrets.BACKEND_PUBLIC_URL }}";
          EOF

      - name: Deploy to Cloudflare Pages with Wrangler
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          command: pages deploy frontend --project-name ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }} --branch main

